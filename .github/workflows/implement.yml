name: Run pipeline

on:
  schedule:
    # Three times daily at 9am, 3pm, 9pm UTC (data collection through Apr 16)
    # TODO: revert to weekly "0 9 * * 1" after Apr 16
    - cron: "0 9,15,21 * * *"

  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to implement (empty = top from triage)"
        required: false
        type: string
      hitl_mode:
        description: "HITL mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - yolo
          - custom
      model:
        description: "Anthropic model override (empty = Haiku 4.5)"
        required: false
        type: string
      max_cost:
        description: "Budget cap in USD (empty = no limit)"
        required: false
        type: string

  repository_dispatch:
    types: [run-pipeline]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  IMPL_REPO_OWNER: ConduitIO
  IMPL_REPO_NAME: conduit
  IMPL_FORK_OWNER: William-Hill

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Configure git for authenticated pushes
        run: |
          git config --global user.name "conduit-agent"
          git config --global user.email "conduit-agent[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Create artifact output directory
        run: mkdir -p "${{ runner.temp }}/pipeline-artifacts"

      - name: Run pipeline
        env:
          IMPL_ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.client_payload.issue_number || '' }}
          IMPL_MODEL: ${{ github.event.inputs.model || '' }}
          IMPL_MAX_COST: ${{ github.event.inputs.max_cost || '' }}
          HITL_MODE: ${{ github.event.inputs.hitl_mode || (github.event_name == 'schedule' && 'yolo') || 'full' }}
          IMPL_ARTIFACT_DIR: ${{ runner.temp }}/pipeline-artifacts
        run: go run ./cmd/implementer

      - name: Write workflow summary
        if: always()
        run: |
          ARTIFACT_DIR="${{ runner.temp }}/pipeline-artifacts"
          echo "## Pipeline Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **HITL mode:** ${{ github.event.inputs.hitl_mode || 'full' }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ github.event.inputs.issue_number || github.event.client_payload.issue_number || '' }}" ]; then
            echo "- **Issue:** #${{ github.event.inputs.issue_number || github.event.client_payload.issue_number }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$ARTIFACT_DIR/cost.json" ]; then
            echo "### Cost Breakdown" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$ARTIFACT_DIR/cost.json" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_id }}
          path: ${{ runner.temp }}/pipeline-artifacts/
          retention-days: 90
          if-no-files-found: warn
